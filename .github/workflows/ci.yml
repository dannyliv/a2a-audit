name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # llama-cpp-python (a default dep, used by the gguf backend) compiles from
      # source from PyPI, so the runner needs a C/C++ toolchain and cmake. This
      # mirrors a real end-user install (no third-party wheel index).
      - name: Install build toolchain (for llama-cpp-python)
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake
      - name: Install package + dev extras
        run: python -m pip install --upgrade pip && pip install -e ".[dev,llm]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy a2a_audit
      - name: Tests (offline only)
        run: pytest -v -m "not network"
      - name: Dependency audit
        run: pip-audit || true
