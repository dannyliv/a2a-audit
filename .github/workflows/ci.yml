name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      # llama-cpp-python (a default dep, used by the gguf backend) compiles from
      # source. Install it from the prebuilt CPU wheel index first so CI needs no
      # C++ toolchain. End-user installs still build it normally.
      - name: Pre-install llama-cpp-python (prebuilt CPU wheel)
        run: >-
          uv pip install --system "llama-cpp-python>=0.2.80"
          --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu
          --index-strategy unsafe-best-match
      - name: Install (with dev extras)
        run: uv pip install --system -e ".[dev,llm]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy a2a_audit
      - name: Tests (offline only)
        run: pytest -v -m "not network"
      - name: Dependency audit
        run: pip-audit || true
